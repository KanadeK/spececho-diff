name: Bug report
description: Report a reproducible SpecEcho Diff bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, OpenAPI snippets, and redacted outputs.
    validations:
      required: true


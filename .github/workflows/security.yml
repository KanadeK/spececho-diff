name: Security

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e '.[dev]'
      - run: python -m pip list --format=freeze
      - run: git grep -nE 'gho_|ghp_|BEGIN PRIVATE KEY|AWS_SECRET_ACCESS_KEY|password\s*=' -- . ':!.github/workflows/security.yml' && exit 1 || exit 0

